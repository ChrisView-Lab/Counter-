<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/normalize.css" />
    <title>Counter</title>
  </head>
  <body>
    <div class="header">
      <p class="dark-mode-text" id="dark-mode-text">Dark Mode</p>

      <button type="button" class="btn-dark" id="btn-dark">ON/OFF</button>
    </div>
    <div class="wrapper">
      <h1 class="h1" id="title">COUNTER</h1>
      <h2 class="numberShow" id="number">0</h2>
      <button class="allButtons small minus">-</button>
      <button class="allButtons reset">RESET</button>
      <button class="allButtons small plus">+</button>
    </div>

    <footer id="contact" class="contact">
      <h4 id="created">Created By Cristina Todisco</h4>
      <p>
        <a
          class="profile-link"
          href="https://www.linkedin.com/in/cristina-todisco-b46a517b/"
          target="_blank"
          rel="noopener noreferrer"
          >Linkedin</a
        >
      </p>
      <p>
        <a
          class="profile-link"
          href="https://github.com/ChrisView-Lab"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >
      </p>
    </footer>
    <script src="/function.js"></script>
  </body>
</html>
